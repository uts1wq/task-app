<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン — ToDoリスト</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="auth-container">
    <div class="auth-box">
        <div class="auth-title">ToDoリスト</div>

        {% if error %}
        <div class="auth-error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label class="form-label">ユーザー名</label>
                <input type="text" name="username" class="form-input" placeholder="ユーザー名" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">パスワード</label>
                <input type="password" name="password" class="form-input" placeholder="パスワード" required>
            </div>
            <button type="submit" class="btn-primary">ログイン</button>
        </form>

        <div class="auth-link">
            アカウントをお持ちでない方は <a href="/register">新規登録</a>
        </div>
    </div>
</div>
</body>
</html>
