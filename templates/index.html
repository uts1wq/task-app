<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Task App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">
    <h1>タスク管理</h1>

    <form method="POST">
        <input type="text" name="task" placeholder="タスク" required>
        <button type="submit">追加</button>
    </form>

    <div id="task-list">
        {% for t in tasks %}
        <div class="task-card" draggable="true" data-id="{{ t.id }}">
            {{ t.title }}
            <button onclick="deleteTask({{ t.id }})">削除</button>
        </div>
        {% endfor %}
    </div>
</div>

<script>
const list = document.getElementById("task-list");

function deleteTask(id){
    fetch("/delete/" + id).then(()=>location.reload());
}

// =====================
// PCドラッグ
// =====================
let dragged = null;

list.addEventListener("dragstart", e => {
    dragged = e.target;
    dragged.classList.add("dragging");
});

list.addEventListener("dragover", e => {
    e.preventDefault();

    const target = e.target.closest(".task-card");
    if (!target || target === dragged) return;

    const rect = target.getBoundingClientRect();
    const offset = e.clientY - rect.top;

    // ① 位置記録
    const items = [...document.querySelectorAll(".task-card")];
    const pos = new Map();
    items.forEach(el => pos.set(el, el.getBoundingClientRect()));

    // ② DOM変更
    if (offset > rect.height/2){
        target.after(dragged);
    } else {
        target.before(dragged);
    }

    // ③ アニメーション
    requestAnimationFrame(()=>{
        items.forEach(el=>{
            const old = pos.get(el);
            const newPos = el.getBoundingClientRect();

            const dx = old.left - newPos.left;
            const dy = old.top - newPos.top;

            if(dx || dy){
                el.style.transform = `translate(${dx}px, ${dy}px)`;
                requestAnimationFrame(()=>{
                    el.style.transition = "transform 0.25s";
                    el.style.transform = "";
                });
            }
        });
    });
});

list.addEventListener("dragend", () => {
    dragged.classList.remove("dragging");
    saveOrder();
});

// =====================
// スマホドラッグ
// =====================
let touchItem = null;
let hold = null;
let dragging = false;

list.addEventListener("touchstart", e => {
    const card = e.target.closest(".task-card");
    if(!card) return;

    hold = setTimeout(()=>{
        touchItem = card;
        dragging = true;
        card.classList.add("dragging");
    }, 300);
});

list.addEventListener("touchmove", e => {
    if(!dragging) return;
    e.preventDefault();

    const y = e.touches[0].clientY;
    const items = [...document.querySelectorAll(".task-card")];

    items.forEach(item=>{
        if(item === touchItem) return;

        const rect = item.getBoundingClientRect();
        const mid = rect.top + rect.height/2;

        if(y > rect.top && y < rect.bottom){

            const pos = new Map();
            items.forEach(el=>pos.set(el, el.getBoundingClientRect()));

            if(y > mid){
                item.after(touchItem);
            } else {
                item.before(touchItem);
            }

            requestAnimationFrame(()=>{
                items.forEach(el=>{
                    const old = pos.get(el);
                    const newPos = el.getBoundingClientRect();

                    const dx = old.left - newPos.left;
                    const dy = old.top - newPos.top;

                    if(dx || dy){
                        el.style.transform = `translate(${dx}px, ${dy}px)`;
                        requestAnimationFrame(()=>{
                            el.style.transition = "transform 0.25s";
                            el.style.transform = "";
                        });
                    }
                });
            });

        }
    });
});

list.addEventListener("touchend", ()=>{
    clearTimeout(hold);

    if(touchItem){
        touchItem.classList.remove("dragging");
        touchItem = null;
        dragging = false;
        saveOrder();
    }
});

// =====================
// 保存
// =====================
function saveOrder(){
    const ids = [...document.querySelectorAll(".task-card")]
        .map(el=>el.dataset.id);

    fetch("/reorder", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({order: ids})
    });
}
</script>

</body>
</html>
