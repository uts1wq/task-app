<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ToDoリスト</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- ヘッダー -->
<header class="header">
    <div class="header-title">ToDoリスト</div>
    <a href="/profile" class="user-badge">
        <div class="user-avatar">
            {% if avatar_url %}
                <img src="{{ avatar_url }}" alt="avatar">
            {% else %}
                <span class="avatar-placeholder">{{ username[0].upper() }}</span>
            {% endif %}
        </div>
        <span class="user-name">{{ username }}</span>
    </a>
</header>

<div class="container">

    <!-- 並び替え -->
    <div class="sort">
        <a href="#" class="sort-btn active" data-sort="deadline">期限順</a>
        <a href="#" class="sort-btn" data-sort="manual">手動並び順</a>
    </div>

    <!-- 追加フォーム -->
    <div class="task-form">
        <input type="text" id="new-title" placeholder="タスクを入力...">
        <input type="date" id="new-deadline">
        <button id="btn-add">＋ 追加</button>
    </div>

    <!-- タスクリスト -->
    <div class="task-list" id="task-list">
        <div class="loading">読み込み中...</div>
    </div>

</div>

<script>
let currentSort = "deadline";
let tasks = [];

document.addEventListener("DOMContentLoaded", () => {
    loadTasks();

    document.getElementById("btn-add").addEventListener("click", addTask);
    document.getElementById("new-title").addEventListener("keydown", e => {
        if (e.key === "Enter") addTask();
    });

    document.querySelectorAll(".sort-btn").forEach(btn => {
        btn.addEventListener("click", e => {
            e.preventDefault();
            currentSort = btn.dataset.sort;
            document.querySelectorAll(".sort-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            loadTasks();
        });
    });
});

async function loadTasks() {
    const res = await fetch(`/api/tasks?sort=${currentSort}`);
    tasks = await res.json();
    renderTasks();
}

function renderTasks() {
    const list = document.getElementById("task-list");
    if (tasks.length === 0) {
        list.innerHTML = `<div class="empty">タスクがありません。追加してみましょう！</div>`;
        return;
    }
    list.innerHTML = "";
    tasks.forEach(task => list.appendChild(createCard(task)));
    initDrag();
}

function escapeHtml(str) {
    return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function formatDeadline(d) {
    if (!d) return "期限なし";
    const [y, m, day] = d.split("-");
    return `${y}/${m}/${day}`;
}

function createCard(task) {
    const card = document.createElement("div");
    card.className = "task-card" + (task.overdue && !task.done ? " overdue" : "") + (task.done ? " is-done" : "");
    card.dataset.id = task.id;

    card.innerHTML = `
        <div class="drag-handle">⠿</div>
        <div class="task-body">
            <div class="task-view" id="view-${task.id}">
                <div class="task-title ${task.done ? "done" : ""}">${escapeHtml(task.title)}</div>
                <div class="task-meta">
                    <span class="deadline-label">${formatDeadline(task.deadline)}</span>
                    ${task.overdue && !task.done ? '<span class="badge overdue-badge">期限切れ</span>' : ""}
                    ${task.done ? '<span class="badge done-badge">完了</span>' : ""}
                </div>
            </div>
            <div class="task-edit" id="edit-${task.id}" style="display:none;">
                <input type="text" class="edit-title" value="${escapeHtml(task.title)}">
                <input type="date" class="edit-deadline" value="${task.deadline || ""}">
                <div class="edit-actions">
                    <button class="btn-save" onclick="saveEdit(${task.id})">保存</button>
                    <button class="btn-cancel" onclick="cancelEdit(${task.id})">キャンセル</button>
                </div>
            </div>
        </div>
        <div class="task-actions">
            <button class="btn-toggle ${task.done ? "btn-undo" : "btn-done"}" onclick="toggleTask(${task.id})">
                ${task.done ? "元に戻す" : "完了"}
            </button>
            <button class="btn-edit" onclick="toggleEdit(${task.id})">編集</button>
            <button class="btn-delete" onclick="deleteTask(${task.id})">削除</button>
        </div>
    `;
    return card;
}

async function addTask() {
    const titleEl = document.getElementById("new-title");
    const deadlineEl = document.getElementById("new-deadline");
    const title = titleEl.value.trim();
    const deadline = deadlineEl.value;
    if (!title) { titleEl.focus(); return; }

    const res = await fetch("/api/tasks", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title, deadline })
    });
    if (res.ok) {
        titleEl.value = "";
        deadlineEl.value = "";
        loadTasks();
    }
}

async function toggleTask(id) {
    const res = await fetch(`/api/tasks/${id}/toggle`, { method: "POST" });
    if (res.ok) {
        const data = await res.json();
        const task = tasks.find(t => t.id === id);
        if (task) task.done = data.done;
        const card = document.querySelector(`.task-card[data-id="${id}"]`);
        if (card) {
            card.classList.toggle("is-done", data.done);
            card.classList.toggle("overdue", task.overdue && !data.done);
            const titleEl = card.querySelector(".task-title");
            if (titleEl) titleEl.classList.toggle("done", data.done);
            card.querySelector(".btn-toggle").textContent = data.done ? "元に戻す" : "完了";
            card.querySelector(".btn-toggle").className = `btn-toggle ${data.done ? "btn-undo" : "btn-done"}`;
            // バッジ更新
            const meta = card.querySelector(".task-meta");
            const oldBadge = meta.querySelector(".badge");
            if (oldBadge) oldBadge.remove();
            if (data.done) {
                meta.insertAdjacentHTML("beforeend", '<span class="badge done-badge">完了</span>');
            } else if (task.overdue) {
                meta.insertAdjacentHTML("beforeend", '<span class="badge overdue-badge">期限切れ</span>');
            }
        }
    }
}

function toggleEdit(id) {
    const view = document.getElementById(`view-${id}`);
    const edit = document.getElementById(`edit-${id}`);
    const isHidden = edit.style.display === "none";
    edit.style.display = isHidden ? "flex" : "none";
    view.style.display = isHidden ? "none" : "block";
    if (isHidden) edit.querySelector(".edit-title").focus();
}

function cancelEdit(id) { toggleEdit(id); }

async function saveEdit(id) {
    const edit = document.getElementById(`edit-${id}`);
    const title = edit.querySelector(".edit-title").value.trim();
    const deadline = edit.querySelector(".edit-deadline").value;
    if (!title) return;

    const res = await fetch(`/api/tasks/${id}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title, deadline })
    });
    if (res.ok) {
        const updated = await res.json();
        const task = tasks.find(t => t.id === id);
        if (task) { task.title = updated.title; task.deadline = updated.deadline; task.overdue = updated.overdue; }
        renderTasks();
    }
}

async function deleteTask(id) {
    if (!confirm("このタスクを削除しますか？")) return;
    const res = await fetch(`/api/tasks/${id}`, { method: "DELETE" });
    if (res.ok) {
        const card = document.querySelector(`.task-card[data-id="${id}"]`);
        if (card) {
            card.style.transition = "opacity 0.2s, transform 0.2s";
            card.style.opacity = "0";
            card.style.transform = "translateX(20px)";
            setTimeout(() => { tasks = tasks.filter(t => t.id !== id); card.remove(); }, 200);
        }
    }
}

function initDrag() {
    const list = document.getElementById("task-list");
    let dragging = null, ghost = null, offsetX = 0, offsetY = 0;

    list.addEventListener("pointerdown", e => {
        const handle = e.target.closest(".drag-handle");
        const card = e.target.closest(".task-card");
        if (!handle || !card) return;
        e.preventDefault();
        list.setPointerCapture(e.pointerId);
        dragging = card;
        dragging.style.opacity = "0";
        const rect = card.getBoundingClientRect();
        offsetX = e.clientX - rect.left;
        offsetY = e.clientY - rect.top;
        ghost = card.cloneNode(true);
        ghost.style.cssText = `
            position:fixed; width:${rect.width}px;
            left:${rect.left}px; top:${rect.top}px;
            pointer-events:none; z-index:999;
            transform:rotate(1deg) scale(1.02);
            box-shadow:0 12px 32px rgba(0,0,0,0.15);
            border-radius:12px; opacity:0.95;
            background:white; border:1.5px solid #ccc;
            padding:14px 18px; display:flex; align-items:center; gap:14px;
        `;
        document.body.appendChild(ghost);
    });

    list.addEventListener("pointermove", e => {
        if (!ghost || !dragging) return;
        ghost.style.left = (e.clientX - offsetX) + "px";
        ghost.style.top  = (e.clientY - offsetY) + "px";
        const cards = [...list.querySelectorAll(".task-card")];
        for (const card of cards) {
            if (card === dragging) continue;
            const rect = card.getBoundingClientRect();
            if (e.clientY < rect.top + rect.height / 2) { list.insertBefore(dragging, card); return; }
        }
        list.appendChild(dragging);
    });

    list.addEventListener("pointerup", () => {
        if (!dragging) return;
        dragging.style.opacity = "";
        if (ghost) { ghost.remove(); ghost = null; }
        dragging = null;
        saveOrder();
    });
}

function saveOrder() {
    const ids = [...document.querySelectorAll(".task-card")].map(el => el.dataset.id);
    fetch("/api/reorder", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ order: ids })
    });
}
</script>
</body>
</html>
