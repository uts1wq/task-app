<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Task App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>タスク管理</h1>
    <p class="user">ログイン中: {{ username }}</p>

    <div class="top-bar">
        <a href="/logout">ログアウト</a>
    </div>

    <!-- 並び替え -->
    <div class="sort">
        <a href="/?sort=deadline"
           class="{% if request.args.get('sort') != 'manual' %}active{% endif %}">
            期限順
        </a>
        <a href="/?sort=manual"
           class="{% if request.args.get('sort') == 'manual' %}active{% endif %}">
            手動並び順
        </a>
    </div>

    <!-- 追加フォーム -->
    <form method="POST" class="task-form">
        <input type="text" name="task" placeholder="タスクを入力" required>
        <input type="date" name="deadline">
        <button type="submit" class="btn-add">追加</button>
    </form>

    <!-- タスクリスト -->
    <div class="task-list" id="task-list">

        {% for task in tasks %}
        <div class="task-card {% if task.overdue %}overdue{% endif %}"
             draggable="true"
             data-id="{{ task.id }}">

            <div class="task-info">

                <div id="text-{{ task.id }}" class="task-title {% if task.done %}done{% endif %}">
                    {% if task.done %}✔ {% endif %}
                    {{ task.title }}
                </div>

                <form id="edit-{{ task.id }}"
                      class="edit-form"
                      method="POST"
                      action="/edit/{{ task.id }}"
                      style="display:none;">
                    <input type="text" name="task" value="{{ task.title }}" required>
                    <input type="date" name="deadline" value="{{ task.deadline }}">
                    <button type="submit" class="btn-edit">保存</button>
                </form>

                <div class="deadline">
                    期限: {{ task.deadline if task.deadline else 'なし' }}
                </div>

            </div>

            <div class="actions">
                <button type="button" onclick="toggleTask({{ task.id }})" class="btn-done">完了</button>
                <button type="button" onclick="toggleEdit({{ task.id }})" class="btn-edit">編集</button>
                <button type="button" onclick="deleteTask({{ task.id }})" class="btn-delete">削除</button>
            </div>

        </div>
        {% endfor %}

    </div>

</div>

<script>

// =========================
// ソート状態を保持してリロード
// =========================
function reloadWithSort() {
    const sort = new URLSearchParams(location.search).get("sort") || "deadline";
    location.href = "/?sort=" + sort;
}

// =========================
// 完了・削除
// =========================
function toggleTask(id) {
    fetch("/toggle/" + id, { method: "POST" }).then(reloadWithSort);
}

function deleteTask(id) {
    if (confirm("削除する？")) {
        fetch("/delete/" + id, { method: "POST" }).then(reloadWithSort);
    }
}

// =========================
// 編集フォーム表示切替
// =========================
function toggleEdit(id) {
    const text = document.getElementById("text-" + id);
    const form = document.getElementById("edit-" + id);

    if (form.style.display === "none") {
        form.style.display = "flex";
        text.style.display = "none";
    } else {
        form.style.display = "none";
        text.style.display = "block";
    }
}

// =========================
// ドラッグ（PC）
// =========================
let dragged = null;
const list = document.getElementById("task-list");

list.addEventListener("dragstart", (e) => {
    dragged = e.target.closest(".task-card");
    dragged.classList.add("dragging");
});

list.addEventListener("dragover", (e) => {
    e.preventDefault();

    const target = e.target.closest(".task-card");
    if (!target || target === dragged) return;

    const rect = target.getBoundingClientRect();
    const offset = e.clientY - rect.top;

    if (offset > rect.height / 2) {
        target.after(dragged);
    } else {
        target.before(dragged);
    }
});

list.addEventListener("dragend", () => {
    if (dragged) {
        dragged.classList.remove("dragging");
        saveOrder();
    }
});

// =========================
// ドラッグ（スマホ）
// =========================
let touchItem = null;

list.addEventListener("touchstart", (e) => {
    const card = e.target.closest(".task-card");
    if (!card) return;
    touchItem = card;
    card.classList.add("dragging");
});

// ← ここが壊れていた。{ passive: false } は末尾のオプションとして正しく渡す
list.addEventListener("touchmove", (e) => {
    if (!touchItem) return;

    e.preventDefault();

    const y = e.touches[0].clientY;
    const items = [...document.querySelectorAll(".task-card")];

    items.forEach(item => {
        if (item === touchItem) return;

        const rect = item.getBoundingClientRect();
        const mid = rect.top + rect.height / 2;

        if (y > rect.top && y < rect.bottom) {
            if (y > mid) {
                item.after(touchItem);
            } else {
                item.before(touchItem);
            }
        }
    });
}, { passive: false });  // ← ここ

list.addEventListener("touchend", () => {
    if (!touchItem) return;
    touchItem.classList.remove("dragging");
    touchItem = null;
    saveOrder();
});

// =========================
// 並び順を保存
// =========================
function saveOrder() {
    const ids = [...document.querySelectorAll(".task-card")]
        .map(el => el.dataset.id);

    fetch("/reorder", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ order: ids })
    }).then(res => {
        if (!res.ok) console.error("保存失敗", res.status);
    });
}

</script>
</body>
</html>
