<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Task App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>タスク管理</h1>
    <p class="user">ログイン中: {{ username }}</p>

    <div class="top-bar">
        <a href="/logout">ログアウト</a>
    </div>

    <!-- 並び替え -->
    <div class="sort">
        <a href="/?sort=deadline"
           class="{% if request.args.get('sort') != 'manual' %}active{% endif %}">
            期限順
        </a>
        <a href="/?sort=manual"
           class="{% if request.args.get('sort') == 'manual' %}active{% endif %}">
            手動並び順
        </a>
    </div>

    <!-- 追加フォーム -->
    <form method="POST" class="task-form">
        <input type="text" name="task" placeholder="タスクを入力" required>
        <input type="date" name="deadline">
        <button type="submit" class="btn-add">追加</button>
    </form>

    <!-- タスクリスト -->
    <div class="task-list" id="task-list">

        {% for task in tasks %}
        <div class="task-card {% if task.overdue %}overdue{% endif %}"
             data-id="{{ task.id }}">

            <div class="task-info">

                <div id="text-{{ task.id }}" class="task-title {% if task.done %}done{% endif %}">
                    {% if task.done %}✔ {% endif %}
                    {{ task.title }}
                </div>

                <form id="edit-{{ task.id }}"
                      class="edit-form"
                      method="POST"
                      action="/edit/{{ task.id }}"
                      style="display:none;">
                    <input type="text" name="task" value="{{ task.title }}" required>
                    <input type="date" name="deadline" value="{{ task.deadline }}">
                    <button type="submit" class="btn-edit">保存</button>
                </form>

                <div class="deadline">
                    期限: {{ task.deadline if task.deadline else 'なし' }}
                </div>

            </div>

            <div class="actions">
                <button type="button" onclick="toggleTask({{ task.id }})" class="btn-done">完了</button>
                <button type="button" onclick="toggleEdit({{ task.id }})" class="btn-edit">編集</button>
                <button type="button" onclick="deleteTask({{ task.id }})" class="btn-delete">削除</button>
            </div>

        </div>
        {% endfor %}

    </div>

</div>

<script>

// =========================
// ソート状態を保持してリロード
// =========================
function reloadWithSort() {
    const sort = new URLSearchParams(location.search).get("sort") || "deadline";
    location.href = "/?sort=" + sort;
}

// =========================
// 完了・削除
// =========================
function toggleTask(id) {
    fetch("/toggle/" + id, { method: "POST" }).then(reloadWithSort);
}

function deleteTask(id) {
    if (confirm("削除する？")) {
        fetch("/delete/" + id, { method: "POST" }).then(reloadWithSort);
    }
}

// =========================
// 編集フォーム表示切替
// =========================
function toggleEdit(id) {
    const text = document.getElementById("text-" + id);
    const form = document.getElementById("edit-" + id);

    if (form.style.display === "none") {
        form.style.display = "flex";
        text.style.display = "none";
    } else {
        form.style.display = "none";
        text.style.display = "block";
    }
}

// =========================
// ドラッグ（Pointer Events / PC・スマホ共通）
// =========================
const list = document.getElementById("task-list");

let dragging = null;
let ghost    = null;
let offsetX  = 0;
let offsetY  = 0;

function pointerDown(e) {
    const card = e.target.closest(".task-card");
    if (!card) return;

    // ボタン・input操作中はドラッグしない
    if (e.target.closest("button, input, form")) return;

    e.preventDefault();
    list.setPointerCapture(e.pointerId);

    dragging = card;
    dragging.style.opacity = "0";

    // ゴースト（動く本体）を生成
    const rect = card.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;

    ghost = card.cloneNode(true);
    ghost.style.cssText = `
        position: fixed;
        width: ${rect.width}px;
        left: ${rect.left}px;
        top: ${rect.top}px;
        pointer-events: none;
        z-index: 999;
        transform: rotate(1.5deg) scale(1.03);
        box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        transition: transform 0.1s ease;
        border-radius: 10px;
        background: white;
        padding: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        opacity: 0.95;
    `;
    document.body.appendChild(ghost);
}

function pointerMove(e) {
    if (!ghost || !dragging) return;

    // ゴーストをポインタに追従
    ghost.style.left = (e.clientX - offsetX) + "px";
    ghost.style.top  = (e.clientY - offsetY) + "px";

    // 挿入位置を判定
    const cards = [...list.querySelectorAll(".task-card")];
    for (const card of cards) {
        if (card === dragging) continue;
        const rect = card.getBoundingClientRect();
        if (e.clientY < rect.top + rect.height / 2) {
            list.insertBefore(dragging, card);
            return;
        }
    }
    list.appendChild(dragging);
}

function pointerUp() {
    if (!dragging) return;

    dragging.style.opacity = "";
    if (ghost) { ghost.remove(); ghost = null; }
    dragging = null;

    saveOrder();
}

list.addEventListener("pointerdown", pointerDown);
list.addEventListener("pointermove", pointerMove);
list.addEventListener("pointerup",   pointerUp);

// =========================
// 並び順を保存
// =========================
function saveOrder() {
    const ids = [...document.querySelectorAll(".task-card")]
        .map(el => el.dataset.id);

    fetch("/reorder", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ order: ids })
    }).then(res => {
        if (!res.ok) console.error("保存失敗", res.status);
    });
}

</script>
</body>
</html>
