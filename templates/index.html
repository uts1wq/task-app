<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Task App</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <!-- ヘッダー -->
    <h1>タスク管理</h1>

    <p class="user">ログイン中: {{ username }}</p>

    <div style="text-align:right;">
        <a href="/logout">ログアウト</a>
    </div>

    <!-- 並び替え -->
    <div class="sort">
        <a href="/?sort=deadline"
           {% if request.args.get("sort") != "new" %}class="active"{% endif %}>
           期限順
        </a>

        <a href="/?sort=new"
           {% if request.args.get("sort") == "new" %}class="active"{% endif %}>
           新しい順
        </a>
    </div>

    <!-- 追加フォーム -->
    <form method="POST">
        <input type="text" name="task" placeholder="タスクを入力" required>
        <input type="date" name="deadline">
        <button type="submit" class="btn-add">追加</button>
    </form>

    <!-- タスクリスト -->
    <div class="task-list">

        {% for task in tasks %}
        <div class="task-card {% if task.overdue %}overdue{% endif %}">

            <!-- 左：タイトル -->
            <div class="task-info">
                <div class="task-title {% if task.done %}done{% endif %}">
                    {% if task.done %}✔ {% endif %}
                    {{ task.title }}
                </div>

                <div class="deadline">
                    期限: {{ task.deadline }}
                </div>
            </div>

            <!-- 右：操作 -->
            <div class="actions">

                <button
                    class="btn-done"
                    onclick="location.href='/toggle/{{ task.id }}'">
                    完了
                </button>

                <button
                    class="btn-edit"
                    onclick="location.href='/edit/{{ task.id }}'">
                    編集
                </button>

                <button
                    class="btn-delete"
                    onclick="location.href='/delete/{{ task.id }}'">
                    削除
                </button>

            </div>

        </div>
        {% endfor %}

    </div>

</div>

</body>
</html>
