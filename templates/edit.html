<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>タスク編集</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>タスク編集</h1>

    <!-- 編集カード -->
    <div class="task-card">

        <form method="POST" class="edit-form">


    <!-- タスク名（元データ入り） -->
    <input 
        type="text"
        name="task"
        value="{{ task.title }}"
        required
    >

    <!-- 期限（元データ入り） -->
    <input 
        type="date"
        name="deadline"
        value="{{ task.deadline }}"
    >

    <button type="submit" class="btn-edit">
        保存
    </button>

</form>

    </div>

    <!-- プレビュー -->
    <div class="task-card">

        <h3>プレビュー</h3>

        <p>
            タスク：
            <strong>{{ task.title }}</strong>
        </p>

        <p>
            期限：
            {{ task.deadline if task.deadline else "未設定" }}
        </p>

        <p>
            状態：
            {% if task.done %}
                完了済み
            {% else %}
                未完了
            {% endif %}
        </p>

    </div>

    <!-- 戻る -->
    <div style="margin-top: 20px; text-align:center;">
        <a href="/">← タスク一覧へ戻る</a>
    </div>

</div>

</body>
</html>
